services:
  - type: web

    name: attendx

    runtime: python

    plan: free

    buildCommand: ./build.sh

    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 300 run:app

    autoDeploy: true

    envVars:

      - key: PYTHON_VERSION
        value: "3.11.11"

      - key: FLASK_ENV
        value: production

      - key: SECRET_KEY
        generateValue: true

      - key: SKIP_AI_PRELOAD
        value: "true"

      - key: PYTHONUNBUFFERED
        value: "1"